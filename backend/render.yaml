services:
  - type: web
    name: hospital-pharmacy-backend
    env: node
    buildCommand: npm install
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 5000

      - key: DB_HOST
        sync: false

      - key: DB_PORT
        sync: false

      - key: DB_USER
        sync: false

      - key: DB_PASSWORD
        sync: false

      - key: DB_NAME
        sync: false

      - key: RAZORPAY_KEY_ID
        sync: false

      - key: RAZORPAY_KEY_SECRET
        sync: false